<style>
*{

padding:0;
box-sizing:border-box;

body{
background:linear-gradient(180deg,#140021,#240046,#120018);

.card{
max-width:420px;
margin:auto;

img{
width:120px;
height:120px;
border-radius:50%;
border:4px solid #b300ff;
object-fit:cover;
}

h1{
margin-top:15px;
font-size:30px;
}

p{
margin-top:10px;
color:#ddd;
}

.btn{
display:block;
width:100%;
padding:16px;
margin-top:15px;
border-radius:14px;
text-decoration:none;
font-weight:bold;
font-size:18px;
color:white;
background:#8a2be2;
transition:.3s;
}

.btn:hover{
background:#b300ff;
transform:scale(1.03);
}

.footer{
margin-top:25px;
font-size:14px;
color:#aaa;
}

<script>
const tombol = document.querySelectorAll(".btn");

tombol.forEach(btn=>{
btn.addEventListener("mouseenter",()=>{
btn.style.boxShadow="0 0 20px #b300ff";
});

btn.addEventListener("mouseleave",()=>{
btn.style.boxShadow="none";
});

btn.addEventListener("click",()=>{
btn.style.transform="scale(.96)";
setTimeout(()=>{
btn.style.transform="scale(1)";
},150);
});
});
